{% extends "base.html" %}

{% block title %}Score Resume - Rezumate{% endblock %}

{% block content %}
<div class="card">
    <h1 class="card-title">Score Resume</h1>

    <form id="scoreForm">
        <div class="form-group">
            <label class="form-label" for="jobDescription">Job Description</label>
            <textarea
                id="jobDescription"
                name="job_description"
                class="form-textarea"
                placeholder="Paste the job description here..."
                required
            ></textarea>
        </div>

        <div class="form-group">
            <div id="uploadArea" class="upload-area">
                <div class="upload-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                    </svg>
                </div>
                <p class="upload-title">No resume uploaded</p>
                <p class="upload-subtitle">Upload your resume in PDF format</p>
                <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('resumeInput').click()">
                    Upload Resume
                </button>
                <input type="file" id="resumeInput" class="upload-input" accept=".pdf,application/pdf" />
            </div>

            <div id="fileDisplay" class="file-display">
                <div class="file-info">
                    <div class="file-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                        </svg>
                    </div>
                    <span id="fileName" class="file-name"></span>
                </div>
                <button type="button" class="file-remove" onclick="removeFile()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="alertError" class="alert alert-error"></div>

        <button type="submit" id="submitBtn" class="btn btn-primary" disabled>
            Get Score
        </button>
    </form>
</div>

<div id="loadingCard" class="card loading">
    <div class="spinner"></div>
    <span class="loading-text">Analyzing resume...</span>
</div>

<div id="resultsCard" class="card results-card">
    <div class="results-header">
        <h2 class="results-title">Resume Score</h2>
    </div>
    <div id="resultsContent" class="results-content"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const uploadArea = document.getElementById('uploadArea');
    const fileDisplay = document.getElementById('fileDisplay');
    const fileNameSpan = document.getElementById('fileName');
    const resumeInput = document.getElementById('resumeInput');
    const submitBtn = document.getElementById('submitBtn');
    const scoreForm = document.getElementById('scoreForm');
    const loadingCard = document.getElementById('loadingCard');
    const resultsCard = document.getElementById('resultsCard');
    const resultsContent = document.getElementById('resultsContent');
    const alertError = document.getElementById('alertError');

    let selectedFile = null;

    // Restore state from sessionStorage
    const savedState = sessionStorage.getItem('scoreState');
    if (savedState) {
        try {
            const state = JSON.parse(savedState);
            if (state.jobDescription) {
                document.getElementById('jobDescription').value = state.jobDescription;
            }
            if (state.result) {
                resultsContent.innerHTML = formatMarkdown(state.result, state.warnings, state.deterministic_signals, state.resume_text);
                resultsCard.classList.add('visible');
            }
            if (state.filename) {
                fileNameSpan.textContent = state.filename;
                uploadArea.style.display = 'none';
                fileDisplay.classList.add('visible');
            }
        } catch (e) {}
    }

    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
    });

    resumeInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleFile(file);
    });

    function handleFile(file) {
        const validTypes = ['application/pdf'];
        if (!validTypes.includes(file.type) && !file.name.match(/\.pdf$/i)) {
            showError('Please upload a PDF file');
            return;
        }
        selectedFile = file;
        fileNameSpan.textContent = file.name;
        uploadArea.style.display = 'none';
        fileDisplay.classList.add('visible');
        submitBtn.disabled = false;
        hideError();
    }

    function removeFile() {
        selectedFile = null;
        resumeInput.value = '';
        uploadArea.style.display = 'block';
        fileDisplay.classList.remove('visible');
        submitBtn.disabled = true;
        resultsCard.classList.remove('visible');
        sessionStorage.removeItem('scoreState');
    }

    function showError(message) {
        alertError.textContent = message;
        alertError.classList.add('visible');
    }

    function hideError() {
        alertError.classList.remove('visible');
    }

    scoreForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const jobDescription = document.getElementById('jobDescription').value.trim();
        if (!jobDescription) {
            showError('Please enter a job description');
            return;
        }

        if (!selectedFile) {
            showError('Please upload a resume');
            return;
        }

        const formData = new FormData();
        formData.append('job_description', jobDescription);
        formData.append('resume', selectedFile);

        submitBtn.disabled = true;
        loadingCard.classList.add('visible');
        resultsCard.classList.remove('visible');

        try {
            const response = await fetch('/api/score', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || 'Failed to analyze resume');
            }

            resultsContent.innerHTML = formatMarkdown(data.result, data.warnings, data.deterministic_signals, data.resume_text);
            resultsCard.classList.add('visible');

            // Save for chat page
            sessionStorage.setItem('resumeData', JSON.stringify({
                filename: data.filename,
                text: data.resume_text,
                jobDescription: jobDescription,
                score: data.result
            }));

            // Save score page state
            sessionStorage.setItem('scoreState', JSON.stringify({
                jobDescription: jobDescription,
                filename: data.filename,
                result: data.result,
                resume_text: data.resume_text,
                warnings: data.warnings,
                deterministic_signals: data.deterministic_signals
            }));

        } catch (error) {
            showError(error.message);
        } finally {
            submitBtn.disabled = false;
            loadingCard.classList.remove('visible');
        }
    });

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function formatMarkdown(data, warnings = [], deterministicSignals = null, resumeText = '') {
        // data is now a structured object: { match_percentage, fit_level, matched_skills, missing_skills, strengths, improvement_suggestions }
        if (typeof data === 'string') {
            // Fallback for old data if any
            return `<p>${data}</p>`;
        }

        const warningHtml = warnings && warnings.length ? `
            <div class="analysis-section warning-section">
                <h4>Extraction Warnings</h4>
                <ul class="warning-list">
                    ${warnings.map(w => `<li>${escapeHtml(w)}</li>`).join('')}
                </ul>
            </div>
        ` : '';

        const signalHtml = deterministicSignals ? `
            <div class="analysis-section">
                <h4>Deterministic Checks</h4>
                <div class="signal-grid">
                    <div><strong>${deterministicSignals.keyword_coverage}%</strong><span>Keyword coverage</span></div>
                    <div><strong>${deterministicSignals.weak_bullet_count}</strong><span>Weak bullets</span></div>
                    <div><strong>${deterministicSignals.bullets_without_measurable_impact_count}</strong><span>No measurable impact</span></div>
                    <div><strong>${deterministicSignals.estimated_resume_length_words}</strong><span>Words extracted</span></div>
                </div>
            </div>
        ` : '';

        const previewHtml = resumeText ? `
            <details class="analysis-section resume-preview">
                <summary>Resume Text Preview</summary>
                <pre>${escapeHtml(resumeText)}</pre>
            </details>
        ` : '';

        let html = `
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                ${warningHtml}
                <div style="display: flex; align-items: center; justify-content: center; gap: 2rem; flex-wrap: wrap; background: var(--accent-secondary); padding: 2rem; border-radius: var(--radius); border: 2px solid var(--border-color);">
                    <div class="score-circle-container">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" stroke-dasharray="${data.match_percentage}, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="20.35" class="percentage">${escapeHtml(data.match_percentage)}%</text>
                        </svg>
                    </div>
                    <div style="text-align: center;">
                        <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem;">${escapeHtml(data.fit_level)}</h3>
                        <p style="color: var(--text-secondary);">Overall Fit Assessment</p>
                    </div>
                </div>

                <div class="analysis-grid">
                    <div class="analysis-section">
                        <h4>Strengths</h4>
                        <ul class="strength-list">
                            ${data.strengths.map(s => `<li>${escapeHtml(s)}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <div class="analysis-section">
                        <h4>Areas for Improvement</h4>
                        <ul class="improvement-list">
                            ${data.improvement_suggestions.map(s => `<li>${escapeHtml(s)}</li>`).join('')}
                        </ul>
                    </div>
                </div>

                <div class="analysis-section">
                    <h4>Skill Match Analysis</h4>
                    <div class="skill-grid">
                        ${data.matched_skills.map(s => `
                            <div class="skill-card ${s.match_type.toLowerCase()}">
                                <div class="skill-header">
                                    <span class="skill-name">${escapeHtml(s.skill)}</span>
                                    <span class="skill-badge">${escapeHtml(s.match_type)}</span>
                                </div>
                                ${s.evidence ? `<p class="skill-evidence">${escapeHtml(s.evidence)}</p>` : ''}
                            </div>
                        `).join('')}
                        ${data.missing_skills.map(s => `
                            <div class="skill-card missing">
                                <div class="skill-header">
                                    <span class="skill-name">${escapeHtml(s)}</span>
                                    <span class="skill-badge">Missing</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ${signalHtml}
                ${previewHtml}
                <div class="analysis-actions">
                    <a class="btn btn-secondary" href="/chat">Ask Follow-up Questions</a>
                </div>
            </div>
        `;

        return html;
    }
</script>

<style>
    .circular-chart { display: block; margin: 10px auto; max-width: 120px; max-height: 120px; }
    .circle-bg { fill: none; stroke: var(--border-light); stroke-width: 3.8; }
    .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; animation: progress 1s ease-out forwards; stroke: var(--accent-primary); }
    .percentage { fill: var(--text-primary); font-family: inherit; font-size: 0.5rem; text-anchor: middle; font-weight: 800; }
    @keyframes progress { 0% { stroke-dasharray: 0 100; } }

    .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .analysis-grid { grid-template-columns: 1fr; } }

    .analysis-section h4 { font-size: 1.125rem; margin-bottom: 1rem; border-left: 4px solid var(--accent-primary); padding-left: 0.75rem; }
    .strength-list li { margin-bottom: 0.5rem; color: #16a34a; font-weight: 500; }
    .improvement-list li { margin-bottom: 0.5rem; color: #ca8a04; font-weight: 500; }

    .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
    .skill-card { padding: 1rem; border: 2px solid var(--border-color); border-radius: var(--radius); background: var(--bg-secondary); }
    .skill-card.full { border-color: #16a34a; background: #f0fdf4; }
    .skill-card.partial { border-color: #ca8a04; background: #fefce8; }
    .skill-card.missing { border-color: #dc2626; background: #fef2f2; opacity: 0.8; }
    
    .skill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .skill-name { font-weight: 700; font-size: 0.9375rem; }
    .skill-badge { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; padding: 0.125rem 0.375rem; border-radius: 4px; border: 1px solid currentColor; }
    .full .skill-badge { color: #16a34a; }
    .partial .skill-badge { color: #ca8a04; }
    .missing .skill-badge { color: #dc2626; }
    .skill-evidence { font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.4; }
    .warning-section { border: 2px solid #ca8a04; background: #fefce8; border-radius: var(--radius); padding: 1rem; }
    .warning-list li { margin-bottom: 0.5rem; color: #854d0e; font-weight: 500; }
    .signal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
    .signal-grid div { border: 2px solid var(--border-color); border-radius: var(--radius); padding: 1rem; background: var(--bg-secondary); }
    .signal-grid strong { display: block; font-size: 1.5rem; margin-bottom: 0.25rem; }
    .signal-grid span { color: var(--text-secondary); font-size: 0.8125rem; font-weight: 700; }
    .resume-preview summary { cursor: pointer; font-weight: 800; font-size: 1.125rem; border-left: 4px solid var(--accent-primary); padding-left: 0.75rem; }
    .resume-preview pre { margin-top: 1rem; max-height: 320px; overflow: auto; white-space: pre-wrap; word-break: break-word; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: var(--radius); padding: 1rem; font: inherit; font-size: 0.875rem; line-height: 1.5; }
    .analysis-actions { display: flex; justify-content: flex-end; }
</style>
{% endblock %}
